<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thiệp mời tốt nghiệp Kim Trinh</title>
  <meta name="description" content="Công cụ tạo thiệp mời tốt nghiệp dạng dọc, có thể chỉnh sửa và tải PNG.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,600&family=Great+Vibes&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script defer src="script.js"></script>
</head>
<body>
  <main class="app-shell">
    <section class="workspace" aria-label="Thiệp mời tốt nghiệp">
      <div class="card-frame">
        <article id="invitationCard" class="invitation-card template-rose" aria-label="Thiệp mời tốt nghiệp Kim Trinh">
          <!-- Background decorations -->
          <div class="soft-glow glow-one"></div>
          <div class="soft-glow glow-two"></div>
          <div class="mist-layer"></div>
          <img class="flower-cluster flower-left" src="./images/flower-left.png" alt="">
          <img class="flower-cluster flower-right" src="./images/flower-right.png" alt="">
          <div class="petal petal-one"></div>
          <div class="petal petal-two"></div>
          <div class="petal petal-three"></div>
          <div class="petal petal-four"></div>
          <div class="petal petal-five"></div>
          <div class="petal petal-six"></div>

          <!-- Top ribbon and school logo -->
          <aside class="vertical-ribbon">
            <div class="ribbon-emblem has-logo">
              <img id="schoolLogo" class="school-logo" src="./assets/LOGO HCMUTE.png" alt="Logo trường">
              <svg class="default-emblem" viewBox="0 0 120 120" role="img" aria-label="Mũ tốt nghiệp">
                <path class="laurel" d="M37 82c-15-14-15-35-2-49M83 82c15-14 15-35 2-49" fill="none" stroke-width="4" stroke-linecap="round"/>
                <path class="laurel" d="M32 70l-10 2M34 58l-11-2M38 46l-9-6M88 70l10 2M86 58l11-2M82 46l9-6" fill="none" stroke-width="3" stroke-linecap="round"/>
                <path class="cap" d="M25 43l35-17 35 17-35 17z"/>
                <path class="cap" d="M43 55v18c12 8 23 8 35 0V55"/>
                <path class="tassel" d="M84 47v24"/>
                <circle class="tassel" cx="84" cy="75" r="4"/>
              </svg>
            </div>
          </aside>

          <!-- Header copy -->
          <header class="card-header">
            <p class="invite-label">THÂN MỜI</p>
            <p class="guest-name" data-bind="guestName">Bạn</p>
            <h1 class="graduate-title" data-bind="graduateName">Kim Trinh</h1>
            <span class="title-swash" aria-hidden="true"></span>
          </header>

          <!-- Event date and time -->
          <section class="event-row" aria-label="Ngày và thời gian">
            <div class="date-block">
              <p data-bind="weekday">SATURDAY</p>
              <strong data-bind="month">JULY</strong>
              <span data-bind="day">26</span>
              <em data-bind="year">2026</em>
            </div>
            <div class="time-block">
              <p data-bind="session">BUỔI CHIỀU</p>
              <strong data-bind="time">14:00 – 17:00</strong>
              <div class="ornament" aria-hidden="true">
                <span></span><i></i><span></span>
              </div>
            </div>
          </section>

          <!-- Location -->
          <section class="location-block" aria-label="Địa điểm">
            <svg class="pin-icon" viewBox="0 0 48 48" aria-hidden="true">
              <path d="M24 4c-8.2 0-14.8 6.4-14.8 14.4 0 10.8 14.8 25.6 14.8 25.6s14.8-14.8 14.8-25.6C38.8 10.4 32.2 4 24 4z"/>
              <circle cx="24" cy="18.5" r="5.2"/>
            </svg>
            <div>
              <h2 data-bind="school">ĐH SƯ PHẠM KỸ THUẬT TP.HCM</h2>
              <p data-bind="addressLine1">Số 1 Võ Văn Ngân,</p>
              <p data-bind="addressLine2">Phường Linh Chiểu, TP. Thủ Đức</p>
            </div>
          </section>

          <!-- Congratulation artwork -->
          <section class="congrats-area" aria-label="Chúc mừng">
            <div class="congrats-ribbon">
              <span>CONGRATULATIONS</span>
            </div>
            <div class="graduate-mark">
              <p>Graduate</p>
              <strong data-bind="yearLarge">2026</strong>
              <i aria-hidden="true">♥</i>
            </div>
            <div class="heart-ornament" aria-hidden="true">
              <span></span><b>♥</b><span></span>
            </div>
          </section>

          <!-- Graduate photo -->
          <section class="graduate-figure" aria-label="Ảnh người tốt nghiệp">
            <div class="figure-light"></div>
            <img id="graduateImage" src="./images/graduate.png" alt="Cô gái tốt nghiệp">
          </section>
        </article>
      </div>
    </section>

    <aside class="control-panel" aria-label="Bảng chỉnh sửa thiệp">
      <div class="panel-heading">
        <p>Graduation Card</p>
        <h2>Tạo thiệp mời</h2>
      </div>

      <form id="editorForm" class="editor-form">
        <label>
          <span>Mẫu thiệp</span>
          <select id="styleSelect" name="styleSelect">
            <option value="template-rose">Rose Gold</option>
            <option value="template-ivory">Ivory Gold</option>
            <option value="template-modern">Modern Blush</option>
            <option value="template-pearl">Pearl Pink</option>
            <option value="template-editorial">Editorial Black</option>
            <option value="template-sage">Sage Garden</option>
            <option value="template-lavender">Lavender Dream</option>
            <option value="template-burgundy">Burgundy Gala</option>
            <option value="template-sky">Sky Blue Classic</option>
            <option value="template-ocean">Ocean Teal</option>
            <option value="template-navy">Deep Navy</option>
            <option value="template-royal">Royal Blue</option>
            <option value="template-blueprint">Blue Minimal</option>
            <option value="template-midnight-script">Midnight Script</option>
            <option value="template-navy-gold">Navy Gold</option>
            <option value="template-satin-blue">Satin Blue</option>
          </select>
        </label>

        <label>
          <span>Tên người được mời</span>
          <input type="text" name="guestName" value="Bạn" data-target="guestName">
        </label>

        <label>
          <span>Tên người tốt nghiệp</span>
          <input type="text" name="graduateName" value="Kim Trinh" data-target="graduateName">
        </label>

        <div class="field-grid">
          <label>
            <span>Ngày</span>
            <input type="text" name="day" value="26" data-target="day">
          </label>
          <label>
            <span>Tháng</span>
            <input type="text" name="month" value="JULY" data-target="month">
          </label>
          <label>
            <span>Năm</span>
            <input type="text" name="year" value="2026" data-target="year">
          </label>
        </div>

        <label>
          <span>Thứ</span>
          <input type="text" name="weekday" value="SATURDAY" data-target="weekday">
        </label>

        <div class="field-grid two-columns">
          <label>
            <span>Buổi</span>
            <input type="text" name="session" value="BUỔI CHIỀU" data-target="session">
          </label>
          <label>
            <span>Thời gian</span>
            <input type="text" name="time" value="14:00 – 17:00" data-target="time">
          </label>
        </div>

        <label>
          <span>Tên trường</span>
          <input type="text" name="school" value="ĐH SƯ PHẠM KỸ THUẬT TP.HCM" data-target="school">
        </label>

        <label>
          <span>Địa chỉ dòng 1</span>
          <input type="text" name="addressLine1" value="Số 1 Võ Văn Ngân," data-target="addressLine1">
        </label>

        <label>
          <span>Địa chỉ dòng 2</span>
          <input type="text" name="addressLine2" value="Phường Linh Chiểu, TP. Thủ Đức" data-target="addressLine2">
        </label>

        <label>
          <span>Ảnh người tốt nghiệp</span>
          <input id="photoInput" type="file" accept="image/png,image/jpeg,image/webp">
        </label>

        <label>
          <span>Logo trường trong vòng tròn</span>
          <input id="logoInput" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml">
        </label>

        <label class="toggle-row">
          <input id="animationToggle" type="checkbox" checked>
          <span>Bật chuyển động cánh hoa</span>
        </label>
      </form>

      <button id="downloadButton" class="download-button" type="button">Tải thiệp PNG</button>
      <p id="statusMessage" class="status-message" aria-live="polite"></p>
    </aside>
  </main>
</body>
</html>
